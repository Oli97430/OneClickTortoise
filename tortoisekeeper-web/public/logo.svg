<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="shellGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </radialGradient>
    <radialGradient id="hexGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </radialGradient>
  </defs>

  <!-- Fond circulaire vert -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>

  <!-- Queue -->
  <ellipse cx="60" cy="90" rx="4" ry="8" fill="#4e342e" transform="rotate(0,60,90)"/>

  <!-- Pattes arrière -->
  <ellipse cx="36" cy="83" rx="9" ry="5" fill="#388e3c" transform="rotate(-35,36,83)"/>
  <ellipse cx="84" cy="83" rx="9" ry="5" fill="#388e3c" transform="rotate(35,84,83)"/>

  <!-- Pattes avant -->
  <ellipse cx="32" cy="52" rx="9" ry="5" fill="#388e3c" transform="rotate(35,32,52)"/>
  <ellipse cx="88" cy="52" rx="9" ry="5" fill="#388e3c" transform="rotate(-35,88,52)"/>

  <!-- Carapace principale -->
  <ellipse cx="60" cy="64" rx="28" ry="24" fill="url(#shellGrad)"/>

  <!-- Hexagone central -->
  <polygon points="60,46 68,51 68,61 60,66 52,61 52,51" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.8"/>

  <!-- Hexagones autour -->
  <polygon points="60,46 68,41 76,46 76,51 68,51" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.7" opacity="0.9"/>
  <polygon points="44,51 52,46 52,51 52,61 44,61" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.7" opacity="0.9"/>
  <polygon points="68,51 76,46 84,51 84,61 76,61 68,61" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.7" opacity="0.9"/>
  <polygon points="52,61 60,66 60,76 52,76 44,71 44,61" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.7" opacity="0.9"/>
  <polygon points="60,66 68,61 76,61 76,71 68,76 60,76" fill="url(#hexGrad)" stroke="#3e2723" stroke-width="0.7" opacity="0.9"/>

  <!-- Tête -->
  <circle cx="60" cy="38" r="10" fill="#388e3c"/>
  <circle cx="57" cy="36" r="2" fill="#1b5e20"/>
  <circle cx="63" cy="36" r="2" fill="#1b5e20"/>
  <circle cx="57.5" cy="35.5" r="0.8" fill="white"/>
  <circle cx="63.5" cy="35.5" r="0.8" fill="white"/>

  <!-- Curseur "OneClick" en haut à droite -->
  <g transform="translate(76, 18) rotate(-15)">
    <!-- Ombre curseur -->
    <polygon points="2,2 2,18 6,14 9,20 11,19 8,13 13,13" fill="rgba(0,0,0,0.25)"/>
    <!-- Curseur blanc -->
    <polygon points="0,0 0,16 4,12 7,18 9,17 6,11 11,11" fill="white"/>
    <polygon points="0,0 0,16 4,12 7,18 9,17 6,11 11,11" fill="none" stroke="#1b5e20" stroke-width="0.8"/>
  </g>

  <!-- Point de clic lumineux -->
  <circle cx="76" cy="19" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <circle cx="76" cy="19" r="2" fill="white" opacity="0.5"/>
</svg>
